{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 65vh;">
        <div class="col-md-4">
            <div class="p-5 rounded-0 shadow-sm" style="background-color: #ffffff; border: 1px solid #e5dfd9;">
                
                <div class="text-center mb-4">
                    <h3 class="fw-light mb-2" style="letter-spacing: 4px; color: #111111;">尊榮登入</h3>
                    <p class="text-muted small" style="font-style: italic; color: #555555 !important;">歡迎回到您的 ZHEN 專屬私人試鞋間</p>
                    <hr style="width: 30px; border-top: 1px solid #ba2626; margin: 15px auto;">
                </div>

                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="text-center mb-4">
                            {% for message in messages %}
                                <small class="fw-bold" style="color: #ba2626; letter-spacing: 1px;">※ {{ message }}</small>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('login') }}">
                    
                    <div class="mb-4">
                        <label class="form-label small text-uppercase" style="letter-spacing: 1px; color: #555555;">帳號 (Username)</label>
                        <input type="text" name="username" class="form-control rounded-0 border-0 border-bottom bg-transparent px-0 py-2" style="border-color: #e5dfd9 !important; box-shadow: none;" placeholder="請輸入您的精品帳號" required>
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label small text-uppercase" style="letter-spacing: 1px; color: #555555;">密碼 (Password)</label>
                        <input type="password" name="userpassword" class="form-control rounded-0 border-0 border-bottom bg-transparent px-0 py-2" style="border-color: #e5dfd9 !important; box-shadow: none;" placeholder="請輸入您的密碼" required>
                    </div>
                    
                    <button type="submit" class="btn w-100 py-3 rounded-0 text-white text-uppercase" style="background-color: #111111; border: none; letter-spacing: 2px; font-size: 0.9rem; transition: background-color 0.3s;">
                        開啟璀璨之門
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="small text-muted mb-0">尚未成為會所成員？ <a href="{{ url_for('signup') }}" class="text-dark text-decoration-underline" style="letter-spacing: 1px; color: #ba2626 !important;">即刻尊榮預約</a></p>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
