{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 65vh;">
        <div class="col-md-4">
            <div class="p-5 rounded-0 shadow-sm" style="background-color: #ffffff; border: 1px solid #ebdcd0;">
                
                <div class="text-center mb-5">
                    <h3 class="fw-light mb-2" style="letter-spacing: 3px; color: #2b2724;">會員登入</h3>
                    <p class="text-muted small" style="font-style: italic;">歡迎回到您的專屬私人調香室</p>
                    <hr style="width: 30px; border-top: 1px solid #8a7e75; margin: 15px auto;">
                </div>

                <form method="POST" action="{{ url_for('signin') }}">
                    <div class="mb-4">
                        <label class="form-label small text-uppercase" style="letter-spacing: 1px; color: #6e655f;">帳號 (Username)</label>
                        <input type="text" name="username" class="form-control rounded-0 border-0 border-bottom bg-transparent px-0 py-2" style="border-color: #d1c7bd !important; box-shadow: none;" placeholder="請輸入登入帳號" required>
                    </div>
                    <div class="mb-5">
                        <label class="form-label small text-uppercase" style="letter-spacing: 1px; color: #6e655f;">密碼 (Password)</label>
                        <input type="password" name="password" class="form-control rounded-0 border-0 border-bottom bg-transparent px-0 py-2" style="border-color: #d1c7bd !important; box-shadow: none;" placeholder="請輸入密碼" required>
                    </div>
                    
                    <button type="submit" class="btn w-100 py-3 rounded-0 text-white text-uppercase" style="background-color: #4a423d; border: none; letter-spacing: 2px; font-size: 0.9rem;">
                        開啟氣味之門
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="small text-muted mb-0">尚未加入會員？ <a href="{{ url_for('signup') }}" class="text-dark text-decoration-underline" style="letter-spacing: 1px;">即刻預約</a></p>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
